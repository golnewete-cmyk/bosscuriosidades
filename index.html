<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Protocolo Boss Curiosidades | Estratégia & IA</title>
    <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --black: #0a0a0a;
            --orange: #ff6a00;
            --gold: #d4af37;
            --silver: #e0e0e0;
            --glass: rgba(255, 255, 255, 0.03);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--black);
            color: var(--silver);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* Efeito de Gradiente Dinâmico ao Fundo */
        .bg-glow {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(255, 106, 0, 0.05) 0%, transparent 70%);
            z-index: -1;
            pointer-events: none;
        }

        .container { max-width: 900px; margin: 0 auto; padding: 100px 20px; text-align: center; }

        /* Typography Premium */
        .badge {
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 4px;
            font-size: 12px;
            font-weight: 700;
            margin-bottom: 20px;
            display: block;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.5rem, 8vw, 4.5rem);
            color: #fff;
            margin-bottom: 30px;
            line-height: 1.1;
        }

        h1 span {
            background: linear-gradient(90deg, var(--gold), var(--orange));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.lead {
            font-size: 1.2rem;
            color: #888;
            max-width: 600px;
            margin: 0 auto 50px;
        }

        /* Glassmorphism Card do Formulário */
        .form-card {
            background: var(--glass);
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 50px;
            text-align: left;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
        }

        .form-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 2px;
            background: linear-gradient(90deg, transparent, var(--orange), transparent);
        }

        .input-group { margin-bottom: 30px; }

        label {
            display: block;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--gold);
            margin-bottom: 10px;
            font-weight: 700;
        }

        input, textarea {
            width: 100%;
            background: rgba(255, 255, 255, 0.02);
            border: none;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 15px 0;
            color: #fff;
            font-size: 1rem;
            transition: 0.3s;
            outline: none;
        }

        input:focus, textarea:focus {
            border-bottom-color: var(--orange);
            background: rgba(255, 106, 0, 0.02);
        }

        /* Botão Dopaminérgico */
        .btn-submit {
            width: 100%;
            background: #fff;
            color: #000;
            padding: 20px;
            border: none;
            border-radius: 12px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            margin-top: 20px;
        }

        .btn-submit:hover {
            background: var(--orange);
            color: #fff;
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 20px 40px rgba(255, 106, 0, 0.3);
        }

        footer {
            margin-top: 100px;
            font-size: 10px;
            color: #444;
            letter-spacing: 2px;
        }

        /* Efeitos de Animação */
        .reveal { opacity: 0; transform: translateY(30px); transition: 1s all ease; }
        .reveal.active { opacity: 1; transform: translateY(0); }
    </style>
</head>
<body>

<div class="bg-glow"></div>

<div class="container">
    <span class="badge reveal">Private Access Only</span>
    <h1 class="reveal">Arquitete sua <span>Liberdade.</span></h1>
    <p class="lead reveal">A aplicação para líderes que buscam dissociar o crescimento da operação manual em 2026.</p>

    <div class="form-card reveal">
        <form action="https://docs.google.com/forms/d/e/1FAIpQLScyB-H5eR1D9FmO-J_Yp-mC1Xm_F8oX_I1E8X_I1E8X_I1E8Q/formResponse" method="POST" id="bootstrapForm">
            
            <div class="input-group">
                <label>01. Identidade do Titular</label>
                <input type="text" name="entry.678677076" placeholder="Seu nome completo" required>
            </div>

            <div class="input-group">
                <label>02. Linha Direta (WhatsApp)</label>
                <input type="text" name="entry.1554549533" placeholder="+55 (00) 0 0000-0000" required>
            </div>

            <div class="input-group">
                <label>03. Correio Eletrônico Institucional</label>
                <input type="email" name="entry.948827469" placeholder="exemplo@empresa.com" required>
            </div>

            <div class="input-group">
                <label>04. Vetor de Autoridade (Social)</label>
                <input type="text" name="entry.436339199" placeholder="Link LinkedIn ou Instagram" required>
            </div>

            <div class="input-group">
                <label>05. Visão e Ambição de Mercado</label>
                <textarea name="entry.1427730301" rows="3" placeholder="Qual seu principal objetivo agora?" required></textarea>
            </div>

            <div class="input-group">
                <label>06. Justificativa de Momento (Timing)</label>
                <textarea name="entry.687557737" rows="3" placeholder="Por que este é o momento de escalar?" required></textarea>
            </div>

            <button type="submit" class="btn-submit">Solicitar Diagnóstico Estratégico</button>
        </form>
    </div>

    <footer>
        BOSS CURIOSIDADES © 2026 | ESTRATÉGIA & INTELIGÊNCIA OPERACIONAL
    </footer>
</div>

<script>
    // Animação de Entrada (Scroll Reveal)
    function reveal() {
        var reveals = document.querySelectorAll(".reveal");
        for (var i = 0; i < reveals.length; i++) {
            var windowHeight = window.innerHeight;
            var elementTop = reveals[i].getBoundingClientRect().top;
            var elementVisible = 150;
            if (elementTop < windowHeight - elementVisible) {
                reveals[i].classList.add("active");
            }
        }
    }
    window.addEventListener("scroll", reveal);
    window.onload = reveal;
</script>

</body>
</html>
